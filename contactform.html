<style>
    /* FORM */
    .form-section {
        padding: 40px;
        text-align: center;
        background: #f5f5f5;
    }

    .form-section form {
        max-width: 400px;
        margin: auto;
    }

    .form-section input,
    .form-section textarea {
        width: 100%;
        margin: 10px;
        padding: 10px;
    }

    .form-section button {
        width: 100%;
        padding: 10px;
        background: black;
        color: white;
        border: none;
        cursor: pointer;
    }
</style>

<!-- CONTACT FORM -->
<section id="contactForm" class="form-section hidden">

    <h2>Contact Form</h2>

    <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <input type="number" placeholder="Phone Number" required>

        <textarea placeholder="Your Message"></textarea>

        <button type="submit">Submit</button>
    </form>

</section>
